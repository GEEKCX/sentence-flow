<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Word Cache Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1e293b;
      color: #e2e8f0;
    }
    .section {
      background: #334155;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
    button.danger {
      background: #ef4444;
    }
    button.danger:hover {
      background: #dc2626;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border: 1px solid #475569;
      color: #e2e8f0;
      border-radius: 5px;
    }
    .success {
      color: #22c55e;
      font-weight: bold;
    }
    .error {
      color: #ef4444;
      font-weight: bold;
    }
    .code {
      background: #0f172a;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .word-card {
      background: #475569;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>AI Word Cache Test</h1>

  <div class="section">
    <h2>Add Word to Cache</h2>
    <input type="text" id="word" placeholder="Word (e.g., hello)">
    <input type="text" id="phonetic" placeholder="Phonetic (e.g., /həˈloʊ/)" value="/həˈloʊ/">
    <input type="text" id="pos" placeholder="POS (e.g., int.)" value="int.">
    <input type="text" id="meaning" placeholder="Meaning (e.g., 你好)" value="你好">
    <br><br>
    <button onclick="addWord()">Add to Cache</button>
    <button onclick="showCache()">Show Cache</button>
    <button onclick="clearCache()" class="danger">Clear Cache</button>
  </div>

  <div class="section">
    <h2>Test Cache Lookup</h2>
    <input type="text" id="lookupWord" placeholder="Word to lookup">
    <br><br>
    <button onclick="lookup()">Lookup</button>
  </div>

  <div class="section">
    <h2>Actions Log</h2>
    <div id="log"></div>
  </div>

  <div class="section">
    <h2>Cache Content</h2>
    <div id="cacheContent" class="code"></div>
  </div>

  <div class="section">
    <h2>Word Cards Preview</h2>
    <div id="wordCards"></div>
  </div>

  <script>
    const AI_WORD_CACHE_KEY = 'sentence-flow-ai-word-cache';

    function getCache() {
      try {
        return JSON.parse(localStorage.getItem(AI_WORD_CACHE_KEY) || '{}');
      } catch (err) {
        console.error('Failed to load cache:', err);
        return {};
      }
    }

    function setCache(cache) {
      try {
        localStorage.setItem(AI_WORD_CACHE_KEY, JSON.stringify(cache));
      } catch (err) {
        console.error('Failed to save cache:', err);
      }
    }

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = type;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.insertBefore(entry, logDiv.firstChild);
    }

    function addWord() {
      const word = document.getElementById('word').value.trim();
      const phonetic = document.getElementById('phonetic').value.trim();
      const pos = document.getElementById('pos').value.trim();
      const meaning = document.getElementById('meaning').value.trim();

      if (!word) {
        log('Please enter a word', 'error');
        return;
      }

      const cache = getCache();
      cache[word.toLowerCase()] = {
        text: word,
        phonetic: phonetic,
        pos: pos,
        meaning: meaning,
        timestamp: Date.now()
      };
      setCache(cache);

      log(`Added "${word}" to cache`, 'success');
      showCache();
      renderWordCards();
    }

    function lookup() {
      const word = document.getElementById('lookupWord').value.trim();
      if (!word) {
        log('Please enter a word to lookup', 'error');
        return;
      }

      const cache = getCache();
      const result = cache[word.toLowerCase()];

      if (result) {
        log(`Found "${word}" in cache`, 'success');
        log(`Data: ${JSON.stringify(result)}`);
      } else {
        log(`"${word}" not found in cache`, 'error');
      }
    }

    function showCache() {
      const cache = getCache();
      const keys = Object.keys(cache);
      log(`Cache contains ${keys.length} words`, 'info');

      if (keys.length > 0) {
        log(`Words: ${keys.join(', ')}`);
      }

      document.getElementById('cacheContent').textContent = JSON.stringify(cache, null, 2);
    }

    function clearCache() {
      if (confirm('Are you sure you want to clear all cached AI words?')) {
        localStorage.removeItem(AI_WORD_CACHE_KEY);
        log('Cache cleared', 'success');
        showCache();
        renderWordCards();
      }
    }

    function renderWordCards() {
      const cache = getCache();
      const container = document.getElementById('wordCards');
      const keys = Object.keys(cache).sort();

      if (keys.length === 0) {
        container.innerHTML = '<p class="text-slate-400">No words in cache</p>';
        return;
      }

      container.innerHTML = keys.map(key => {
        const wordData = cache[key];
        return `
          <div class="word-card">
            <h3 class="text-xl font-bold">${wordData.text}</h3>
            <p class="text-sm text-gray-400 font-mono">${wordData.phonetic}</p>
            <span class="inline-block px-2 py-1 bg-purple-600 text-purple-100 text-xs font-medium rounded-md my-2">
              ${wordData.pos}
            </span>
            <p class="text-sm">${wordData.meaning}</p>
          </div>
        `;
      }).join('');
    }

    // Initialize
    window.onload = function() {
      log('Page loaded', 'info');
      showCache();
      renderWordCards();
    };
  </script>
</body>
</html>
