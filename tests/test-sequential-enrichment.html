<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>连续单词补全测试</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    .section {
      margin-bottom: 30px;
      padding: 20px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    .word-row {
      display: grid;
      grid-template-columns: 1fr 2fr 2fr 1fr;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid #eee;
      align-items: center;
    }
    .word-row:last-child {
      border-bottom: none;
    }
    .word-row header {
      font-weight: bold;
      background: #f8f9fa;
      padding: 10px;
    }
    .status-success {
      color: #28a745;
      font-weight: bold;
    }
    .status-error {
      color: #dc3545;
      font-weight: bold;
    }
    .status-loading {
      color: #007bff;
      font-weight: bold;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.success { background: #28a745; }
    button.success:hover { background: #218838; }
    .delay-control {
      margin: 15px 0;
      padding: 15px;
      background: #fff3cd;
      border-radius: 4px;
    }
    #status {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>🔄 连续单词补全测试</h1>
  <div id="status"></div>

  <div class="section">
    <h2>测试配置</h2>
    <div class="delay-control">
      <label>
        请求延迟（毫秒）：
        <input type="number" id="delay-input" value="1000" min="0" max="5000" step="100" style="width: 80px; padding: 5px;">
      </label>
      <p style="margin-top: 5px; font-size: 12px; color: #856404;">
        较短的延迟可能导致API频率限制（QPS）错误
      </p>
    </div>
    <div class="button-group">
      <button onclick="testSequential()">按顺序测试（带延迟）</button>
      <button onclick="testAllOnce()">一次性测试所有</button>
      <button onclick="clearResults()">清除结果</button>
    </div>
  </div>

  <div class="section">
    <h2>测试单词列表</h2>
    <div class="word-row header">
      <div>单词</div>
      <div>音标</div>
      <div>释义</div>
      <div>状态</div>
    </div>
    <div id="word-list">
      <!-- 单词行将通过JavaScript生成 -->
    </div>
  </div>

  <div class="section">
    <h2>统计信息</h2>
    <div id="statistics"></div>
  </div>

  <div class="section">
    <h2>详细日志</h2>
    <div id="log" style="max-height: 300px; overflow-y: auto; background: #f8f9fa; padding: 10px; font-family: monospace; font-size: 12px;"></div>
  </div>

  <script>
    const API_BASE = '/api/dict';
    const testWords = [
      'hello', 'world', 'learn', 'practice', 'fast', 
      'consumption', 'diversity', 'infrastructure', 'knowledge', 'effective',
      'communication', 'foundation', 'successful', 'relationship', 'technology',
      'social', 'classes', 'wildlife', 'protecting', 'genetic'
    ];

    let results = {};
    let requestCount = 0;
    let successCount = 0;
    let errorCount = 0;

    function setStatus(message, type = 'info') {
      const status = document.getElementById('status');
      const colors = {
        info: '#d1ecf1',
        success: '#d4edda',
        error: '#f8d7da',
        warning: '#fff3cd'
      };
      const textColors = {
        info: '#0c5460',
        success: '#155724',
        error: '#721c24',
        warning: '#856404'
      };
      status.style.background = colors[type];
      status.style.color = textColors[type];
      status.textContent = message;
    }

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const colors = {
        info: '#0c5460',
        success: '#155724',
        error: '#721c24',
        warning: '#856404'
      };
      logDiv.innerHTML += `<div style="color: ${colors[type]}; margin: 2px 0;">[${time}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    function generateWordList() {
      const listDiv = document.getElementById('word-list');
      listDiv.innerHTML = '';
      
      testWords.forEach((word, index) => {
        const row = document.createElement('div');
        row.className = 'word-row';
        row.id = `word-${index}`;
        row.innerHTML = `
          <div style="font-weight: bold;">${word}</div>
          <div id="phonetic-${index}" style="font-family: monospace; font-size: 12px;">-</div>
          <div id="meaning-${index}" style="font-size: 12px;">-</div>
          <div id="status-${index}">未测试</div>
        `;
        listDiv.appendChild(row);
      });
    }

    function updateWordResult(index, data, status) {
      const phoneticDiv = document.getElementById(`phonetic-${index}`);
      const meaningDiv = document.getElementById(`meaning-${index}`);
      const statusDiv = document.getElementById(`status-${index}`);

      if (data) {
        phoneticDiv.textContent = data.phonetic || '-';
        meaningDiv.textContent = data.meaning ? (data.meaning.substring(0, 50) + (data.meaning.length > 50 ? '...' : '')) : '-';
      }

      statusDiv.className = '';
      if (status === 'loading') {
        statusDiv.className = 'status-loading';
        statusDiv.textContent = '加载中...';
      } else if (status === 'success') {
        statusDiv.className = 'status-success';
        statusDiv.textContent = '✓ 成功';
      } else if (status === 'error') {
        statusDiv.className = 'status-error';
        statusDiv.textContent = '✗ 失败';
      } else {
        statusDiv.textContent = '未测试';
      }
    }

    function updateStatistics() {
      const statsDiv = document.getElementById('statistics');
      const rate = requestCount > 0 ? Math.round((successCount / requestCount) * 100) : 0;
      statsDiv.innerHTML = `
        <p><strong>请求数：</strong> ${requestCount}</p>
        <p><strong>成功：</strong> ${successCount} (${rate}%)</p>
        <p><strong>失败：</strong> ${errorCount}</p>
      `;
    }

    async function fetchWordData(word, index) {
      requestCount++;
      updateStatistics();
      updateWordResult(index, null, 'loading');
      log(`开始请求: ${word}`, 'info');
      setStatus(`正在查询单词 ${index + 1}/${testWords.length}: "${word}"...`, 'info');

      try {
        const response = await fetch(`${API_BASE}?word=${encodeURIComponent(word)}`);
        const text = await response.text();

        // 检查是否是HTML响应（API错误）
        if (text.includes('<!DOCTYPE') || text.includes('<html')) {
          throw new Error('API返回HTML而非JSON，可能是错误页面');
        }

        const data = JSON.parse(text);

        if (data.code === 200 && data.data) {
          successCount++;
          results[word] = {
            phonetic: data.data.accent || '',
            pos: data.data.pos || '',
            meaning: data.data.mean_cn || data.data.mean_en || '',
            definition: data.data.mean_en || ''
          };
          updateWordResult(index, results[word], 'success');
          log(`成功: ${word} - ${data.data.mean_cn || data.data.mean_en}`, 'success');
          setStatus(`✓ 成功查询: "${word}"`, 'success');
          return results[word];
        } else if (data.code === 201 || !data.data) {
          errorCount++;
          updateWordResult(index, null, 'error');
          log(`未找到: ${word} - ${data.msg || '未收录'}`, 'warning');
          setStatus(`⚠️ 未找到单词: "${word}"`, 'warning');
          return null;
        } else {
          errorCount++;
          updateWordResult(index, null, 'error');
          log(`错误: ${word} - API返回异常`, 'error');
          setStatus(`✗ API错误: "${word}"`, 'error');
          return null;
        }
      } catch (error) {
        errorCount++;
        updateWordResult(index, null, 'error');
        log(`异常: ${word} - ${error.message}`, 'error');
        setStatus(`✗ 请求失败: "${word}" - ${error.message}`, 'error');
        return null;
      }

      updateStatistics();
    }

    async function testSequential() {
      clearResults();
      const delay = parseInt(document.getElementById('delay-input').value) || 1000;
      
      log(`开始顺序测试，延迟: ${delay}ms`, 'info');

      for (let i = 0; i < testWords.length; i++) {
        await fetchWordData(testWords[i], i);
        
        // 等待延迟，但最后一个请求不需要等待
        if (i < testWords.length - 1 && delay > 0) {
          log(`等待 ${delay}ms...`, 'info');
          await new Promise(resolve => setTimeout(resolve, delay));
        }
      }

      const rate = requestCount > 0 ? Math.round((successCount / requestCount) * 100) : 0;
      log(`测试完成: ${successCount}/${requestCount} 成功 (${rate}%)`, 
        successCount === requestCount ? 'success' : 'warning');
      setStatus(`✓ 测试完成: ${successCount}/${requestWords.length} 成功 (${rate}%)`, 'success');
    }

    async function testAllOnce() {
      clearResults();
      log('开始一次性测试所有单词', 'warning');

      const promises = testWords.map((word, index) => fetchWordData(word, index));
      await Promise.all(promises);

      const rate = requestCount > 0 ? Math.round((successCount / requestCount) * 100) : 0;
      log(`测试完成: ${successCount}/${requestCount} 成功 (${rate}%)`, 
        successCount === requestCount ? 'success' : 'warning');
      setStatus(`✓ 测试完成: ${successCount}/${requestCount} 成功 (${rate}%)`, 'success');
    }

    function clearResults() {
      results = {};
      requestCount = 0;
      successCount = 0;
      errorCount = 0;
      updateStatistics();
      generateWordList();
      clearLog();
      log('结果已清除', 'info');
      setStatus('✓ 已清除所有结果', 'success');
    }

    // 初始化
    generateWordList();
    updateStatistics();
    log('页面加载完成', 'info');
    setStatus('✓ 准备就绪，点击按钮开始测试', 'success');
  </script>
</body>
</html>
